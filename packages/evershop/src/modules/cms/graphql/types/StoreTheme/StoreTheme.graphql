"""
Represents a storefront theme installed in Cartify.
"""
type StoreTheme {
  name: String!
  label: String!
  version: String!
  role: String!
  engine: String!
  status: String!
  lastSavedAt: String
  fileCount: Int!
  templateCount: Int!
  sectionCount: Int!
  localeCount: Int!
  errors: [String]
  warnings: [String]
  editUrl: String!
  publishApi: String!
  previewUrl: String!
}

extend type Query {
  storeTheme(name: String!): StoreTheme
  storeThemes: [StoreTheme]
}
